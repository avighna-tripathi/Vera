services:
  - type: web
    name: magicpin-ai-challenge-bot
    runtime: python
    plan: free
    region: oregon
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn bot:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /v1/healthz
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: LLM_PROVIDER
        value: openrouter
      - key: TEAM_NAME
        value: magicpin-challenge
      - key: TEAM_MEMBERS
        value: Codex
      - key: CONTACT_EMAIL
        value: team@example.com
      - key: APP_VERSION
        value: 0.1.0
